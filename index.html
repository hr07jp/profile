        // Icon Component Helper (Support both Lucide and Material Symbols)
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            const [isLucide, setIsLucide] = useState(true);

            useEffect(() => {
                const renderLucide = () => {
                    try {
                        const lucide = window.lucide;
                        if (iconRef.current && lucide) {
                            const icons = lucide.icons || lucide;
                            const camelCase = name.charAt(0).toLowerCase() + name.slice(1);
                            const PascalCase = name.charAt(0).toUpperCase() + name.slice(1);
                            const kebabCase = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();

                            const icon = icons[PascalCase] || icons[name] || icons[camelCase] || icons[kebabCase];

                            if (icon && typeof icon.toSvg === 'function') {
                                iconRef.current.innerHTML = icon.toSvg({
                                    width: size,
                                    height: size,
                                    class: className
                                });
                                setIsLucide(true);
                                return true;
                            }
                        }
                        return false;
                    } catch (e) {
                        return false;
                    }
                };

                if (!renderLucide()) {
                    setIsLucide(false);
                }
            }, [name, size, className]);

            if (isLucide) {
                return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }} />;
            } else {
                return (
                    <span
                        className={`material-symbols-outlined inline-flex items-center justify-center ${className}`}
                        style={{ fontSize: size, width: size, height: size }}
                    >
                        {name}
                    </span>
                );
            }
        };

                            <div className="space-y-2">
                                <h2 className="text-4xl md:text-5xl font-extrabold text-primary">Works & Achievements</h2>
                                <p className="text-on-surface-variant text-lg">これまでの活動実績とプロジェクトの一部をご紹介します。</p>
                            </div>
                            <a href="#" className="text-primary font-extrabold flex items-center gap-2 group">
                                Many Others
                                <Icon name="arrow_forward" size={20} className="group-hover:translate-x-2 transition-transform" />
                            </a>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {projects.map((p, i) => {
                                const CardContainer = p.url ? motion.a : motion.div;
                                return (
                                    <CardContainer
                                        key={i}
                                        {...(p.url ? {
                                            href: p.url,
                                            target: "_blank",
                                            rel: "noopener noreferrer"
                                        } : {})}
                                        initial={{ opacity: 0, y: 20 }}
                                        whileInView={{ opacity: 1, y: 0 }}
                                        viewport={{ once: true }}
                                        transition={{ delay: i * 0.1 }}
                                        className={`bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all group ${p.url ? "cursor-pointer" : ""}`}
                                    >
                                        <div className="h-60 overflow-hidden">
                                            <img
                                                src={p.img}
                                                alt={p.title}
                                                className={`w-full h-full ${p.category === 'Mark/Logotype' ? 'object-contain p-8' : 'object-cover'} group-hover:scale-105 transition-transform duration-700`}
                                                referrerPolicy="no-referrer"
                                            />
                                        </div>
                                        <div className="p-8">
                                            <p className="text-xs text-secondary font-extrabold mb-3 tracking-widest uppercase">{p.category}</p>
                                            <h4 className="text-xl font-bold text-primary mb-3 leading-tight">{p.title}</h4>
                                            <p className="text-on-surface-variant leading-relaxed">{p.desc}</p>
                                        </div>
                                    </CardContainer>
                                );
                            })}
                        </div>
                    </div>
                </section>
            );
        };

        const Contact = () => (
            <section id="contact" className="py-32 px-6">
                <div className="max-w-4xl mx-auto">
                    <div className="text-center mb-16 space-y-4">
                        <h2 className="text-4xl font-extrabold text-primary">Let's Create Together</h2>
                        <p className="text-xl text-on-surface-variant">新しいプロジェクトの相談、講演依頼、取材などお気軽にお問い合わせください。</p>
                    </div>

                    <motion.form
                        initial={{ opacity: 0, y: 30 }}
                        whileInView={{ opacity: 1, y: 0 }}
                        viewport={{ once: true }}
                        className="bg-white p-8 md:p-12 rounded-[3rem] shadow-2xl shadow-primary/5 border border-outline-variant/10 space-y-8"
                    >
                        <div className="grid md:grid-cols-2 gap-8">
                            <div className="space-y-3">
                                <label className="text-sm font-extrabold text-primary uppercase tracking-wider">お名前</label>
                                <input
                                    type="text"
                                    placeholder="山田 太郎"
                                    className="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-all py-4 px-4 rounded-t-xl"
                                />
                            </div>
                            <div className="space-y-3">
                                <label className="text-sm font-extrabold text-primary uppercase tracking-wider">メールアドレス</label>
                                <input
                                    type="email"
                                    placeholder="hello@example.com"
                                    className="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-all py-4 px-4 rounded-t-xl"
                                />
                            </div>
                        </div>

                        <div className="space-y-3">
                            <label className="text-sm font-extrabold text-primary uppercase tracking-wider">お問い合わせ種別</label>
                            <div className="relative">
                                <select className="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-all py-4 px-4 rounded-t-xl appearance-none">
                                    <option>法人向けコンサルティング</option>
                                    <option>個人向けレッスン</option>
                                    <option>セミナー・講演依頼</option>
                                    <option>取材・メディア掲載</option>
                                    <option>その他</option>
                                </select>
                                <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none">
                                    <Icon name="expand_more" size={20} className="text-on-surface-variant" />
                                </div>
                            </div>
                        </div>

                        <div className="space-y-3">
                            <label className="text-sm font-extrabold text-primary uppercase tracking-wider">メッセージ</label>
                            <textarea
                                rows={5}
                                placeholder="ご相談内容をご自由に入力ください"
                                className="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-all py-4 px-4 rounded-t-xl"
                            />
                        </div>

                        <div className="flex items-center gap-4 p-4 bg-surface-container-low rounded-2xl">
                            <input
                                type="checkbox"
                                className="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary"
                            />
                            <span className="text-sm text-on-surface-variant font-medium">プライバシーポリシーに同意の上、送信してください。</span>
                        </div>

                        <button type="button" className="w-full py-6 bg-primary text-on-primary font-extrabold rounded-full hover:bg-primary-container shadow-2xl shadow-primary/30 transition-all transform hover:scale-[1.02] text-lg">
                            送信する（工事中）
                        </button>
                    </motion.form>
                </div>
            </section>
        );

        const Footer = () => (
            <footer className="bg-surface-container-low pt-24 pb-12 rounded-t-[4rem]">
                <div className="max-w-7xl mx-auto px-6">
                    <div className="pt-8 border-t border-outline-variant/20 flex flex-col md:flex-row justify-between items-center gap-4 text-xs font-bold text-on-surface-variant/60 uppercase tracking-widest">
                        <p>© 2024 The Digital Atelier. Crafted with human empathy and AI.</p>
                        <p>Tokyo, Japan</p>
                    </div>
                </div>
            </footer>
        );

        const App = () => (
            <div className="min-h-screen">
                <Navbar />
                <main>
                    <Hero />
                    <About />
                    <Skills />
                    <Works />
                    <Contact />
                </main>
                <Footer />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
